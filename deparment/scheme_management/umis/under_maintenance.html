<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSP Portal - Maintenance</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #5a1f80, #2c0055);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            background: #ffffff;
            width: 420px;
            padding: 35px 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            margin: 0;
            color: #333;
            font-size: 22px;
            font-weight: 700;
        }

        p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-top: 12px;
            white-space: pre-line;
        }

        .icon {
            font-size: 55px;
            color: #4e4edb;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: #ddd;
            font-size: 13px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="card">

        <h2>SSP Portal is Under Maintenance</h2>

        <div class="icon">🛠️</div>

        <p>
The State Scholarship Portal is currently undergoing maintenance.  

We regret the inconvenience and appreciate your patience.
        </p>
    </div>

    <footer>
        © Copyright <b>TNeGA</b>. All Rights Reserved
    </footer>

</body>
</html>
