      /* LOADER OVERLAY */
.modal-loader{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;

  opacity:0;
  pointer-events:none;
  transition:all .3s ease;
}

.modal-loader.active{
  opacity:1;
  pointer-events:auto;
}

/* loader card */
.loader-card{
  background:#fff;
  padding:24px 30px;
  border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  text-align:center;
  width:260px;
}

/* spinning icon */
.loader-icon{
  font-size:26px;
  color:#5b5fc7;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}


/* SUCCESS TOAST */
.modal-success{
  position:absolute;
  bottom:20px;
  right:20px;

  background:#10b981;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:8px;

  box-shadow:0 10px 25px rgba(0,0,0,0.15);

  opacity:0;
  transform:translateY(10px);
  transition:all .3s ease;
}

.modal-success.show{
  opacity:1;
  transform:translateY(0);
}

 <script>

document.addEventListener("DOMContentLoaded", function () {

  /* ================================
     SIDEBAR TOGGLE
  ================================= */

  const sidebarToggle = document.getElementById("sidebarToggle");
  const sidebarIcon = sidebarToggle?.querySelector("i");

  if (sidebarToggle) {
    sidebarToggle.addEventListener("click", function () {

      console.log("clicked"); // ✅ debug

      document.body.classList.toggle("sidebar-expanded");

      sidebarIcon?.classList.toggle("bi-list");
      sidebarIcon?.classList.toggle("bi-x-lg");

    });
  }


  /* ================================
     PROFILE DROPDOWN
  ================================= */

  const trigger = document.getElementById("profileTrigger");
  const dropdown = document.getElementById("profileDropdown");

  trigger?.addEventListener("click", function (e) {
    e.stopPropagation();
    dropdown.classList.toggle("show");
  });

  dropdown?.addEventListener("click", function (e) {
    e.stopPropagation();
  });

  document.addEventListener("click", function () {
    dropdown?.classList.remove("show");
  });

});

</script>





  <!-- refresh loader -->
  <script>
    $('.refresh_submit').on('click', function () {

  let loader = $('#modalLoader');
  let progressBar = $('#progressBar');
  let success = $('#modalSuccess');

  loader.addClass('active');

  let progress = 0;

  let interval = setInterval(() => {

    progress += Math.floor(Math.random() * 10) + 5; // smooth random speed

    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);

      // complete progress
      progressBar.css('width', '100%').text('100%');

      // show success
      setTimeout(() => {
        loader.removeClass('active');
        success.addClass('show');

        // hide success + close modal
        setTimeout(() => {
          success.removeClass('show');
          $('#refreshModal').modal('hide');
        }, 1500);

      }, 500);

    } else {
      progressBar.css('width', progress + '%').text(progress + '%');
    }

  }, 200);

});
  </script>

  <script>
    $(document).on('click', '.ripple', function (e) {

  let $this = $(this);

  let offset = $this.offset();
  let x = e.pageX - offset.left;
  let y = e.pageY - offset.top;

  let ripple = $('<span class="ripple-effect"></span>');

  ripple.css({
    top: y + 'px',
    left: x + 'px',
    width: '20px',
    height: '20px'
  });
